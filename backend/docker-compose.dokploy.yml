services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATA_DIR: data
      UPLOADS_DIR: data/uploads
    volumes:
      - westend_backend_data:/app/data
    expose:
      - "4000"

volumes:
  westend_backend_data:
